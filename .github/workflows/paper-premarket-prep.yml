name: Paper premarket prep (free data)

on:
  workflow_dispatch:
  schedule:
    # Run every 15 min on weekdays; gate below restricts to premarket window.
    - cron: "*/15 * * * 1-5"

concurrency:
  group: alpaca-paper-premarket-prep
  cancel-in-progress: false

jobs:
  gate:
    runs-on: ubuntu-latest
    outputs:
      run: ${{ steps.gate.outputs.run }}
      day: ${{ steps.gate.outputs.day }}
    steps:
      - name: Gate on NY clock (premarket window)
        id: gate
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
        run: |
          python3 << 'PY'
          import os
          from datetime import datetime, time as dt_time
          from zoneinfo import ZoneInfo
          ny = ZoneInfo("America/New_York")
          now = datetime.now(ny)
          event = os.environ.get("GITHUB_EVENT_NAME", "")
          # Premarket prep window: 08:30–09:25 NY (07:30–08:25 Winnipeg)
          start = dt_time(8, 30)
          end = dt_time(9, 25)
          in_window = (now.weekday() < 5) and (start <= now.time() <= end)
          out = "true" if (event == "workflow_dispatch" or in_window) else "false"
          print(f"ny={now.isoformat()} window=08:30-09:25 run={out}")
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as gh:
            gh.write(f"run={out}\n")
            gh.write(f"day={now.date().isoformat()}\n")
          PY

  prep:
    needs: gate
    if: needs.gate.outputs.run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-py312-${{ hashFiles('pyproject.toml') }}

      - uses: actions/cache@v4
        with:
          path: state
          key: alpaca-paper-state-${{ runner.os }}-${{ needs.gate.outputs.day }}-${{ github.run_id }}
          restore-keys: |
            alpaca-paper-state-${{ runner.os }}-${{ needs.gate.outputs.day }}-
            alpaca-paper-state-${{ runner.os }}-

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: pip install -e .

      - name: Build liquid universe (free scanner)
        env:
          APCA_API_KEY_ID: ${{ secrets.APCA_API_KEY_ID }}
          APCA_API_SECRET_KEY: ${{ secrets.APCA_API_SECRET_KEY }}
          UNIVERSE_ENABLED: "true"
          UNIVERSE_MAX_SYMBOLS: "2000"
          UNIVERSE_MIN_AVG_DOLLAR_VOL: "5000000"
          UNIVERSE_MIN_PRICE: "1"
          UNIVERSE_MAX_PRICE: "50"
        run: python -m alpaca_day_bot --build-universe

      - name: Warm up tv-ta-api (Render cold start)
        env:
          TVTA_API_BASE_URL: ${{ secrets.TVTA_API_BASE_URL }}
        run: |
          python3 << 'PY'
          import json, os, time, urllib.request
          base = (os.environ.get("TVTA_API_BASE_URL") or "").strip().rstrip("/")
          if not base:
            raise SystemExit("missing TVTA_API_BASE_URL")
          urls = [f"{base}/health", f"{base}/api/ta/batch"]
          # First call wakes the service; second primes indicator path.
          for u in urls:
            for attempt in range(4):
              try:
                if u.endswith("/health"):
                  with urllib.request.urlopen(u, timeout=20) as resp:
                    body = resp.read().decode("utf-8", "ignore")[:200]
                    print("health", resp.status, body)
                else:
                  payload = json.dumps(
                    {"resolution":"1D","items":[{"symbol":"NASDAQ:AAPL","indicators":["rsi:14","macd"]}]}
                  ).encode("utf-8")
                  req = urllib.request.Request(
                    u,
                    data=payload,
                    headers={"Content-Type":"application/json","Accept":"application/json"},
                    method="POST",
                  )
                  with urllib.request.urlopen(req, timeout=25) as resp:
                    body = resp.read().decode("utf-8", "ignore")[:300]
                    print("batch", resp.status, body)
                break
              except Exception as e:
                wait = 1.0 * (2**attempt)
                print("warmup_failed", u, "attempt", attempt+1, "err", str(e), "sleep", wait)
                time.sleep(wait)
          PY

      - name: Premarket scan (observe-only; no orders)
        env:
          APCA_API_KEY_ID: ${{ secrets.APCA_API_KEY_ID }}
          APCA_API_SECRET_KEY: ${{ secrets.APCA_API_SECRET_KEY }}
          # Ensure no orders are placed in premarket prep.
          OBSERVE_ONLY: "true"
          # Pull free news bundle (combo uses AlphaVantage key if present; otherwise falls back to no-key feeds).
          NEWS_PROVIDER: "combo"
          ALPHAVANTAGE_API_KEY: ${{ secrets.ALPHAVANTAGE_API_KEY }}
          # Indicators via your free Render API
          INDICATOR_PROVIDER: "tvta"
          TVTA_API_BASE_URL: ${{ secrets.TVTA_API_BASE_URL }}
          TVTA_SYMBOL_PREFIX: "NYSE"
          UNIVERSE_ENABLED: "true"
          ENABLE_SHORTS: "true"
          AGGRESSIVE_MODE: "true"
          # Keep risk caps irrelevant in observe-only mode.
          MAX_POSITIONS: "0"
          MAX_TRADES_PER_DAY: "0"
          MAX_GROSS_EXPOSURE_PCT: "0"
          MAX_DAILY_LOSS_PCT: "0"
          MAX_NOTIONAL_PER_TRADE_USD: "50"
          SIGNAL_ACCURACY_MIN_AGE_MINUTES: "0"
        run: python -m alpaca_day_bot --scheduled-tick

      - name: Upload state artifact (debug / backup)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: alpaca-premarket-state-${{ needs.gate.outputs.day }}-${{ github.run_id }}
          path: state/
          if-no-files-found: ignore

