name: top-daytrading-screener

on:
  workflow_dispatch: {}
  schedule:
    - cron: "*/30 * * * *"

jobs:
  run:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tv-ta-api
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run screener
        run: |
          python scripts/run_top_daytrading.py --resolution 1D --limit 30 --out out/top_daytrading.json

      - name: Upload result artifact
        uses: actions/upload-artifact@v4
        with:
          name: top-daytrading
          path: tv-ta-api/out/top_daytrading.json

