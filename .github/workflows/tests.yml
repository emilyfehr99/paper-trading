name: Tests

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install with dev deps
        run: pip install -e ".[dev]"
      - name: Pytest
        run: pytest tests/ -q
