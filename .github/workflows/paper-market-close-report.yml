name: Paper market close report

on:
  workflow_dispatch:
  schedule:
    # After US cash close (16:00 America/New_York).
    # UTC 20:10 during DST, 21:10 during standard time; we gate by NY clock below.
    - cron: "10 20,21 * * 1-5"

concurrency:
  group: alpaca-paper-market-close-report
  cancel-in-progress: false

jobs:
  gate:
    runs-on: ubuntu-latest
    outputs:
      run: ${{ steps.gate.outputs.run }}
      day: ${{ steps.gate.outputs.day }}
    steps:
      - name: Gate on NY clock (after close)
        id: gate
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
        run: |
          python3 << 'PY'
          import os
          from datetime import datetime, time as dt_time
          from zoneinfo import ZoneInfo

          event = os.environ.get("GITHUB_EVENT_NAME", "")
          ny = ZoneInfo("America/New_York")
          now = datetime.now(ny)
          after_close = now.time() >= dt_time(16, 5)
          out = "true" if (event == "workflow_dispatch" or (now.weekday() < 5 and after_close)) else "false"
          print(f"ny={now.isoformat()} after_close={after_close} run={out}")
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as gh:
            gh.write(f"run={out}\n")
            gh.write(f"day={now.date().isoformat()}\n")
          PY

  report:
    needs: gate
    if: needs.gate.outputs.run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-py312-${{ hashFiles('pyproject.toml') }}

      - uses: actions/cache@v4
        with:
          path: state
          key: alpaca-paper-state-${{ runner.os }}-${{ needs.gate.outputs.day }}
          restore-keys: |
            alpaca-paper-state-${{ runner.os }}-

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: pip install -e .

      - name: Write daily report (market close)
        env:
          APCA_API_KEY_ID: ${{ secrets.APCA_API_KEY_ID }}
          APCA_API_SECRET_KEY: ${{ secrets.APCA_API_SECRET_KEY }}
        run: |
          python -m alpaca_day_bot --close-virtual-options
          python -m alpaca_day_bot --write-report

      - name: Upload reports artifact (daily/weekly)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: alpaca-reports-market-close-${{ needs.gate.outputs.day }}-${{ github.run_id }}
          path: reports/
          if-no-files-found: warn

