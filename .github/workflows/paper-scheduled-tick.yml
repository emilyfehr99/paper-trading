# Paper trading: one strategy pass per run when US equities session is open (America/New_York).
# Schedule: every 15 min on weekdays, UTC hours that overlap RTH; a gate skips outside TRADE_*.
# workflow_dispatch always runs the tick (for testing).
#
# Optional repo Variables: GHA_MARKET_TRADE_START, GHA_MARKET_TRADE_END (HH:MM, default 9:35 / 15:59).

name: Paper scheduled tick

on:
  workflow_dispatch:
  schedule:
    # Every 15 min, Mon–Fri; exact trade window enforced by NY-time gate below.
    # (Wider cron makes scheduling more robust if GitHub misses a narrow hour window.)
    - cron: "*/15 * * * 1-5"

concurrency:
  group: alpaca-paper-scheduled-tick
  cancel-in-progress: false

jobs:
  market_open:
    runs-on: ubuntu-latest
    outputs:
      open: ${{ steps.gate.outputs.open }}
    steps:
      - name: US regular session gate (NY time)
        id: gate
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          MARKET_TRADE_START: ${{ vars.GHA_MARKET_TRADE_START }}
          MARKET_TRADE_END: ${{ vars.GHA_MARKET_TRADE_END }}
        run: |
          python3 << 'PY'
          import os
          from datetime import datetime, time as dt_time
          from zoneinfo import ZoneInfo

          def parse_hm(s: str) -> dt_time:
              s = s.strip()
              h, m = s.split(":", 1)
              return dt_time(int(h), int(m))

          event = os.environ.get("GITHUB_EVENT_NAME", "")
          if event == "workflow_dispatch":
              out = "true"
          else:
              start_s = (os.environ.get("MARKET_TRADE_START") or "").strip() or "9:35"
              end_s = (os.environ.get("MARKET_TRADE_END") or "").strip() or "15:59"
              start = parse_hm(start_s)
              end = parse_hm(end_s)
              ny = ZoneInfo("America/New_York")
              now = datetime.now(ny)
              if now.weekday() >= 5:
                  out = "false"
              else:
                  mt = now.time()
                  out = "true" if (start <= mt <= end) else "false"
              print(f"ny={now.isoformat()} window={start_s}-{end_s} open={out}")

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as gh:
              gh.write(f"open={out}\n")
          PY

  tick:
    needs: market_open
    if: needs.market_open.outputs.open == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-py312-${{ hashFiles('pyproject.toml') }}

      - name: NY market date (cache key)
        id: nydate
        run: |
          echo "d=$(python3 -c "from datetime import datetime; from zoneinfo import ZoneInfo; print(datetime.now(ZoneInfo('America/New_York')).date().isoformat())")" >> "$GITHUB_OUTPUT"

      - uses: actions/cache@v4
        with:
          path: state
          # Cache keys are immutable; use a unique key per run and restore the newest via restore-keys.
          key: alpaca-paper-state-${{ runner.os }}-${{ steps.nydate.outputs.d }}-${{ github.run_id }}
          restore-keys: |
            alpaca-paper-state-${{ runner.os }}-${{ steps.nydate.outputs.d }}-
            alpaca-paper-state-${{ runner.os }}-ml-${{ steps.nydate.outputs.d }}-
            alpaca-paper-state-${{ runner.os }}-

      - uses: actions/cache@v4
        with:
          path: state/models
          key: alpaca-paper-models-${{ runner.os }}-${{ steps.nydate.outputs.d }}-${{ github.run_id }}
          restore-keys: |
            alpaca-paper-models-${{ runner.os }}-${{ steps.nydate.outputs.d }}-
            alpaca-paper-models-${{ runner.os }}-

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: pip install -e .

      - name: Build liquid universe (free scanner)
        env:
          APCA_API_KEY_ID: ${{ secrets.APCA_API_KEY_ID }}
          APCA_API_SECRET_KEY: ${{ secrets.APCA_API_SECRET_KEY }}
          UNIVERSE_ENABLED: "true"
          # Wider universe -> more trade opportunities
          UNIVERSE_MAX_SYMBOLS: "2000"
          UNIVERSE_MIN_AVG_DOLLAR_VOL: "20000000"
          UNIVERSE_MIN_PRICE: "5"
        run: python -m alpaca_day_bot --build-universe

      - name: Scheduled tick
        env:
          APCA_API_KEY_ID: ${{ secrets.APCA_API_KEY_ID }}
          APCA_API_SECRET_KEY: ${{ secrets.APCA_API_SECRET_KEY }}
          # News (combo = Alpha Vantage + no-key feeds)
          NEWS_PROVIDER: "combo"
          ALPHAVANTAGE_API_KEY: ${{ secrets.ALPHAVANTAGE_API_KEY }}
          # Indicators (your TV TA API)
          INDICATOR_PROVIDER: "tvta"
          TVTA_API_BASE_URL: ${{ secrets.TVTA_API_BASE_URL }}
          TVTA_SYMBOL_PREFIX: "NYSE"
          # ML model layer (optional; uses state/models/latest.joblib if present)
          MODEL_ENABLED: "true"
          MODEL_MIN_PROBA: "0.60"
          MODEL_MIN_PROBA_LONG: "0.60"
          MODEL_MIN_PROBA_SHORT: "0.70"
          UNIVERSE_ENABLED: "true"
          ENABLE_SHORTS: "true"
          AGGRESSIVE_MODE: "true"
          # Profit-focused filters
          CONFIRM_BARS: "2"
          VOL_SPIKE_SKIP_ENABLED: "true"
          # Virtual options (simulated calls/puts; not sent to Alpaca)
          SIM_OPTIONS_ENABLED: "true"
          SIM_OPTIONS_LEVERAGE: "6"
          SIM_OPTIONS_NOTIONAL_USD: "50"
          # More aggressive risk + frequency (paper only)
          MAX_POSITIONS: "25"
          MAX_TRADES_PER_DAY: "200"
          MAX_GROSS_EXPOSURE_PCT: "0"
          MAX_DAILY_LOSS_PCT: "0.01"
          # Hard per-trade spend cap
          MAX_NOTIONAL_PER_TRADE_USD: "50"
          RISK_PER_TRADE_PCT: "0.01"
          PER_SYMBOL_COOLDOWN_S: "60"
          # Keep whole-share sizing compatible with the per-trade cap
          UNIVERSE_MAX_PRICE: "50"
          UNIVERSE_MIN_PRICE: "5"
          # Loosen HTF trend gates so more setups qualify
          HTF_RSI_MIN: "35"
          HTF_RSI_MAX_SHORT: "70"
          RSI_PULLBACK_MAX: "55"
          RSI_REBOUND_MIN_SHORT: "50"
          VOLUME_CONFIRM_MULT: "0.8"
          # Label immediately so ML can start training sooner (paper only).
          SIGNAL_ACCURACY_MIN_AGE_MINUTES: "60"
          # Free IEX bars are delayed; align the strategy to 15m cadence.
          SIGNAL_TIMEFRAME: "15m"
          # Slower holds reduce noise from delayed bars.
          BASE_HOLD_MINUTES: "45"
          MIN_HOLD_MINUTES: "15"
          MAX_HOLD_MINUTES_DYNAMIC: "90"
          # Execution quality filters
          MIN_VOLUME_RATIO_TRADE: "1.0"
          MAX_SHORT_POSITIONS: "5"
          # Flatten positions before close to avoid overnight holds
          FLATTEN_BEFORE_CLOSE_MINUTES: "5"
        run: python -m alpaca_day_bot --scheduled-tick

      - name: Train/update ML model (from latest labels)
        if: always()
        run: |
          python -m alpaca_day_bot.ml.train \
            --db state/ledger.sqlite3 \
            --out state/models/latest.joblib \
            --min-horizon-minutes 15 \
            --min-rows 1

      - name: Upload state artifact (debug / backup)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: alpaca-state-${{ steps.nydate.outputs.d }}-${{ github.run_id }}
          path: state/
          if-no-files-found: ignore

      - name: Upload state snapshot (latest)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: alpaca-state-latest-${{ steps.nydate.outputs.d }}
          path: state/
          if-no-files-found: ignore

      - name: Upload reports artifact (daily/weekly)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: alpaca-reports-${{ steps.nydate.outputs.d }}-${{ github.run_id }}
          path: reports/
          if-no-files-found: warn
