services:
  - type: web
    name: tv-ta-api
    runtime: docker
    plan: free
    rootDir: tv-ta-api
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 10000
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: CACHE_TTL_SECONDS
        value: "30"

